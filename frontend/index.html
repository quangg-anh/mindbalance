<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#2a3d55" />
    <meta name="description" content="Bốn Năm Thanh Xuân — tự mình chọn 4 năm thanh xuân" />
    <title>Bốn Năm Thanh Xuân</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
    <style>
      #root { min-height: 100dvh; }
      .app-skeleton {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #1a2433;
        color: #fff7ec;
        gap: 14px;
        font-family: 'Be Vietnam Pro', system-ui, sans-serif;
      }
      .app-skeleton svg { width: 48px; height: 48px; animation: skeleton-spin 1.1s linear infinite; }
      .app-skeleton p { margin: 0; opacity: 0.85; }
      @keyframes skeleton-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-skeleton" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="20" stroke="#fff7ec" stroke-opacity="0.25" stroke-width="4" />
          <path d="M24 6a18 18 0 0 1 18 18" stroke="#fff7ec" stroke-width="4" stroke-linecap="round" />
        </svg>
        <p>Đang tải Bốn Năm Thanh Xuân…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
