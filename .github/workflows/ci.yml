name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: workspace/package-lock.json }
      - run: npm ci
        working-directory: workspace
      - run: npm run lint
        working-directory: workspace
      - run: npm run typecheck
        working-directory: workspace
      - run: npm test
        working-directory: workspace
      - run: npm run build
        working-directory: workspace
